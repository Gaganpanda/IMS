# ?? App ??????????????????????????????????????????
spring.application.name=ims-backend
server.port=8080
server.servlet.context-path=/api

# ?? MySQL ?????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/ims_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Gagan@123$
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ?? JPA / Hibernate ???????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.open-in-view=false


# Cache TTL in seconds

# ?? JWT ???????????????????????????????????????????
app.jwt.secret=imsSecretKey2026XYZ!@#SuperSecretKeyForJWTSigningMustBe256BitsLong
app.jwt.expiration=86400000
# 86400000 ms = 24 hours

# ?? File Upload ???????????????????????????????????
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# ?? CORS ?????????????????????????????????????????
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ?? Actuator ?????????????????????????????????????
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ?? Logging ??????????????????????????????????????
logging.level.com.ims=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ?? Jackson ??????????????????????????????????????
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.mapper.accept-case-insensitive-enums=true